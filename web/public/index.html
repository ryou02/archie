<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archie</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <main id="story-shell">
      <section id="story-stage" aria-label="Archie status">
        <section id="avatar-panel" aria-labelledby="avatar-status">
          <div class="panel-header">
            <p class="eyebrow">Archie</p>
            <p id="avatar-status">Ready to build</p>
          </div>
          <div id="avatar-container">
            <img
              id="avatar-placeholder"
              src="images/avatar-placeholder.svg"
              alt="Placeholder portrait for Archie"
            />
          </div>
        </section>
      </section>
      <aside id="activity-rail" aria-label="Chat with Archie">
        <section id="chat-container" aria-label="Chat with Archie">
          <div id="chat-scroll">
            <div id="chat-history"></div>
            <div id="active-build-slot" hidden aria-live="polite"></div>
          </div>
          <div id="chat-input-row">
            <input type="text" id="chat-input" placeholder="Tell Archie what to build..." />
            <button id="mic-btn" title="Hold to talk" aria-label="Hold to talk">🎤</button>
          </div>
        </section>
      </aside>
    </main>
  </div>
  <script src="js/api.js"></script>
  <script src="js/build-state.js"></script>
  <script src="js/voice-input.js"></script>
  <script src="js/voice-output.js"></script>
  <script src="js/chat-model.js"></script>
  <script src="js/build-card.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
